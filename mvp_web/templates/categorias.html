<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Categorías — Tracker de Gastos</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; max-width: 1100px; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin: 16px 0; }
      textarea { width: 100%; min-height: 420px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; padding: 12px; border-radius: 10px; border: 1px solid #ccc; }
      button { padding: 10px 14px; border: 0; border-radius: 10px; background: #111; color: #fff; cursor: pointer; }
      .muted { color: #666; font-size: 14px; }
      .danger { color: #b00020; }
      code { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h2>Categorías</h2>
    <div class="muted">
      Editá <code>keywords</code> y <code>regex</code>. Se valida que el JSON sea válido y que los regex compilen.
    </div>
    <div class="card">
      <a href="/">← Volver</a>
    </div>
    <div class="card">
      {% if errors %}
        <div class="danger">
          <strong>Error al guardar:</strong>
          <ul>
            {% for e in errors %}
              <li>{{ e }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}
      <form method="post" action="/categorias">
        <textarea name="raw_json">{{ raw_json }}</textarea>
        <div style="margin-top:12px">
          <button type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </body>
</html>
